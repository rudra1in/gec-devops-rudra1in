# This workflow will build a Java project with Maven and cache dependencies to speed up future builds.

name: Spring Boot CI with Maven

# Controls when the workflow will run
on:
  push:
    branches: [ "main", "development","feature/**" ] # Triggers on pushes to main and any branch under feature/
  pull_request:
    branches: [ "main","development" ] # Triggers on pull requests targeting the main branch

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Step 1: Checks out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up JDK 17. You can change the version if your project requires a different one.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin' # Eclipse Temurin is a popular, open-source distribution of Java
          cache: 'maven' # Caches Maven dependencies to speed up subsequent builds
      # Step 3: Build with Maven Wrapper
      - name: Grant execute permission to mvnw
        run: chmod +x ./demo-git-boot/demo/mvnw
      # Step 4: Build with Maven Wrapper
      # This command cleans the project, runs tests, and packages the application into a JAR file.
      # Using the Maven Wrapper (mvnw) is a best practice as it ensures a consistent Maven version.
      - name: Build with Maven
        run: ./mvnw clean install
        working-directory: ./demo-git-boot/demo


      # Optional Step 4: You can add steps here to upload the build artifact
      # For example, to save the generated JAR file from the build.
      - name: Upload artifact
        uses: actions/upload-artifact@v4
      #   with:
      #     name: spring-boot-app
      #     path: target/*.jar
